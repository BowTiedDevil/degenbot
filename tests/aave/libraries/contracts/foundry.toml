[profile.default]
src = "src"
out = ".foundry/out"
cache_path = ".foundry/cache"
libs = []

# Compiler settings
solc = "0.8.10"
optimizer = true
optimizer_runs = 200

# Build settings
verbosity = 2

# Remappings (none needed - using relative imports)
# All contracts are self-contained in the src/ directory
